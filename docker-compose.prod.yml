services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-false}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-1}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:?JWT_ISSUER is required}
      JWT_ACCESS_TOKEN_HOURS: ${JWT_ACCESS_TOKEN_HOURS:?JWT_ACCESS_TOKEN_HOURS is required}
      JWT_REFRESH_TOKEN_HOURS: ${JWT_REFRESH_TOKEN_HOURS:?JWT_REFRESH_TOKEN_HOURS is required}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:?SPRING_MAIL_HOST is required}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:?SPRING_MAIL_PORT is required}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:?SPRING_MAIL_USERNAME is required}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:?SPRING_MAIL_PASSWORD is required}
      SPRING_MAIL_IMAP_HOST: ${SPRING_MAIL_IMAP_HOST:?SPRING_MAIL_IMAP_HOST is required}
      SPRING_MAIL_IMAP_PORT: ${SPRING_MAIL_IMAP_PORT:?SPRING_MAIL_IMAP_PORT is required}
      SPRING_MAIL_IMAP_USERNAME: ${SPRING_MAIL_IMAP_USERNAME:?SPRING_MAIL_IMAP_USERNAME is required}
      SPRING_MAIL_IMAP_PASSWORD: ${SPRING_MAIL_IMAP_PASSWORD:?SPRING_MAIL_IMAP_PASSWORD is required}
      SPRING_MAIL_IMAP_SENT_FOLDER: ${SPRING_MAIL_IMAP_SENT_FOLDER:-INBOX.Sent}
      APP_TIME_ZONE: ${APP_TIME_ZONE:?APP_TIME_ZONE is required}
      APP_RECEIPTS_PATH: /app/data/receipts
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      APP_SCHEDULING_ENABLED: "true"
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
        VITE_APP_TIME_ZONE: ${VITE_APP_TIME_ZONE:?VITE_APP_TIME_ZONE is required}
