name: CI and deploy Le Dance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify backend
        working-directory: backend
        env:
          LEDANCE_HOME: ${{ github.workspace }}
        run: bash ./mvnw -B -ntp clean verify

      - name: Set up Node 22.14.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://example.invalid/api
          VITE_APP_TIME_ZONE: America/Argentina/Buenos_Aires
        run: npm run build

  build-and-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require production frontend URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: test -n "$VITE_API_BASE_URL"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        env:
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/le-dance-backend
        run: |
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" ./backend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Build and push frontend
        env:
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/le-dance-frontend
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          docker build \
            --build-arg "VITE_API_BASE_URL=$VITE_API_BASE_URL" \
            --build-arg "VITE_APP_TIME_ZONE=America/Argentina/Buenos_Aires" \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" \
            ./frontend
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Copy Compose file to VPS
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml,docker-compose.prod.yml
          target: /home/jeremias/le-dance/

      - name: Deploy validated images
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/jeremias/le-dance
            export BACKEND_IMAGE="${{ secrets.DOCKER_USERNAME }}/le-dance-backend:${{ github.sha }}"
            export FRONTEND_IMAGE="${{ secrets.DOCKER_USERNAME }}/le-dance-frontend:${{ github.sha }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build
