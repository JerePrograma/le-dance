# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "le-dance"

[setup]
script = ""

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

function Assert-Command {
    param(
        [Parameter(Mandatory = $true)]
        [string] $Name
    )

    if (-not (Get-Command $Name -ErrorAction SilentlyContinue)) {
        throw "Falta '$Name' en PATH. Instalalo o corregí la variable PATH antes de crear el worktree."
    }
}

@(
    "git",
    "java",
    "mvn",
    "node",
    "npm"
) | ForEach-Object {
    Assert-Command $_
}

Write-Host "Verificando Java..."
$javaVersion = (& java -version 2>&1 | Select-Object -First 1)
Write-Host $javaVersion

if ("$javaVersion" -notmatch 'version "21(\.|")') {
    throw "Le Dance requiere JDK 21. Versión detectada: $javaVersion"
}

Write-Host "Preparando dependencias Maven..."

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" -q -DskipTests dependency:go-offline
    }
    else {
        & mvn -q -DskipTests dependency:go-offline
    }

    if ($LASTEXITCODE -ne 0) {
        throw "No se pudieron resolver las dependencias Maven. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Write-Host "Preparando dependencias del frontend..."

Push-Location "frontend"
try {
    if (Test-Path ".\package-lock.json") {
        & npm ci
    }
    else {
        Write-Warning "No existe package-lock.json. Se ejecutará npm install sin generar lockfile."
        & npm install --no-package-lock
    }

    if ($LASTEXITCODE -ne 0) {
        throw "Falló la instalación del frontend. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Write-Host ""
Write-Host "Entorno Le Dance preparado correctamente."
Write-Host "Repositorio: $((Get-Location).Path)"
Write-Host "Java: $javaVersion"
Write-Host "Node: $(& node --version)"
Write-Host "npm: $(& npm --version)"
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
$ErrorActionPreference = "Continue"

$temporaryPaths = @(
    ".\.cache\tmp",
    ".\frontend\.vite"
)

foreach ($path in $temporaryPaths) {
    if (Test-Path $path) {
        Remove-Item `
            -LiteralPath $path `
            -Recurse `
            -Force `
            -ErrorAction SilentlyContinue
    }
}

Write-Host "Limpieza local finalizada."
Write-Host "Los contenedores Docker no fueron detenidos automáticamente."
'''

[[actions]]
name = "Estado"
icon = "tool"
command = '''
git status --short --branch

Write-Host ""
Write-Host "Java:"
java -version

Write-Host ""
Write-Host "Maven:"
mvn -version

Write-Host ""
Write-Host "Node:"
node --version

Write-Host ""
Write-Host "npm:"
npm --version
'''

[[actions]]
name = "Backend verify"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" clean verify
    }
    else {
        & mvn clean verify
    }

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Frontend check"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "frontend"
try {
    & npm run lint

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }

    & npm run build

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Validar todo"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" clean verify
    }
    else {
        & mvn clean verify
    }

    if ($LASTEXITCODE -ne 0) {
        throw "Falló la validación del backend. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Push-Location "frontend"
try {
    & npm run lint

    if ($LASTEXITCODE -ne 0) {
        throw "Falló el lint del frontend. Código: $LASTEXITCODE"
    }

    & npm run build

    if ($LASTEXITCODE -ne 0) {
        throw "Falló el build del frontend. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Write-Host "Backend y frontend validados correctamente."
'''

[[actions]]
name = "DB local"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

docker compose up -d db

if ($LASTEXITCODE -ne 0) {
    exit $LASTEXITCODE
}

docker compose ps
'''

[[actions]]
name = "Backend dev"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" spring-boot:run
    }
    else {
        & mvn spring-boot:run
    }

    exit $LASTEXITCODE
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Frontend dev"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "frontend"
try {
    & npm run dev
    exit $LASTEXITCODE
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Detener Docker"
icon = "tool"
command = '''
docker compose down --remove-orphans
exit $LASTEXITCODE
'''
