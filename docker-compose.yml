services:
  db:
    image: postgres:15.12-alpine3.21
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledance_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
      TZ: ${APP_TIME_ZONE:-America/Argentina/Buenos_Aires}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE:-le-dance-backend:local}
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ledance_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-false}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-1}
      JWT_SECRET: ${JWT_SECRET:-local-only-jwt-secret-change-before-sharing}
      JWT_ISSUER: ${JWT_ISSUER:-le-dance-local}
      JWT_ACCESS_TOKEN_HOURS: ${JWT_ACCESS_TOKEN_HOURS:-2}
      JWT_REFRESH_TOKEN_HOURS: ${JWT_REFRESH_TOKEN_HOURS:-168}
      APP_TIME_ZONE: ${APP_TIME_ZONE:-America/Argentina/Buenos_Aires}
      APP_RECEIPTS_PATH: /app/data/receipts
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8081}
      APP_SCHEDULING_ENABLED: ${APP_SCHEDULING_ENABLED:-false}
      APP_BOOTSTRAP_ADMIN_ENABLED: ${APP_BOOTSTRAP_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME:-}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:-}
      LEDANCE_HOME: /app
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "${BACKEND_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
      - receipts_data:/app/data/receipts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 $${SERVER_PORT}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - internal

  frontend:
    image: ${FRONTEND_IMAGE:-le-dance-frontend:local}
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_APP_TIME_ZONE: ${VITE_APP_TIME_ZONE:-America/Argentina/Buenos_Aires}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  receipts_data:

networks:
  internal:
