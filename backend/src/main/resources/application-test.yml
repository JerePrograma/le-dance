spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://invalid.invalid/explicit-test-datasource-required}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:local-only-test}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}

jwt:
  secret: ${JWT_SECRET:test-only-jwt-secret-with-at-least-32-characters}

app:
  receipts-path: ${APP_RECEIPTS_PATH:${java.io.tmpdir}/le-dance-test/receipts}
  scheduling-enabled: false
